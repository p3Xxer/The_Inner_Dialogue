<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 270" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Deque internal structure</title>
<desc>A contiguous array of pointers, called the map, where each pointer refers to a separately allocated fixed-size chunk of elements below it.</desc>
<defs><marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="340" y="30" font-size="12" fill="#5F5E5A" text-anchor="middle">One contiguous array of pointers</text>
<rect x="210" y="50" width="260" height="34" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="262" y1="50" x2="262" y2="84" stroke="#888780" stroke-width="0.5"/>
<line x1="314" y1="50" x2="314" y2="84" stroke="#888780" stroke-width="0.5"/>
<line x1="366" y1="50" x2="366" y2="84" stroke="#888780" stroke-width="0.5"/>
<line x1="418" y1="50" x2="418" y2="84" stroke="#888780" stroke-width="0.5"/>
<text x="200" y="67" font-size="14" font-weight="500" fill="#444441" text-anchor="end" dominant-baseline="central">Map</text>

<line x1="236" y1="90" x2="100" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a5)"/>
<line x1="288" y1="90" x2="215" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a5)"/>
<line x1="340" y1="90" x2="330" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a5)"/>
<line x1="392" y1="90" x2="445" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a5)"/>
<line x1="444" y1="90" x2="560" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a5)"/>

<rect x="50" y="170" width="100" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="100" y="192" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">Chunk 1</text>
<rect x="165" y="170" width="100" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="215" y="192" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">Chunk 2</text>
<rect x="280" y="170" width="100" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="330" y="192" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">Chunk 3</text>
<rect x="395" y="170" width="100" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="445" y="192" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">Chunk 4</text>
<rect x="510" y="170" width="100" height="44" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="560" y="192" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">New chunk</text>

<text x="340" y="246" font-size="12" fill="#5F5E5A" text-anchor="middle">Growth appends one chunk, and the existing chunks stay where they are</text>
</svg>
