<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 340" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>The LIFO rule</title>
<desc>A vertical stack of four elements where both the push arrow and the pop arrow meet the topmost element.</desc>
<defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="288" y="46" font-size="12" fill="#5F5E5A" text-anchor="middle">push</text>
<line x1="288" y1="58" x2="288" y2="106" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a1)"/>
<text x="392" y="46" font-size="12" fill="#5F5E5A" text-anchor="middle">pop</text>
<line x1="392" y1="106" x2="392" y2="58" stroke="#993C1D" stroke-width="1.5" marker-end="url(#a1)"/>

<rect x="240" y="112" width="200" height="42" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="133" font-size="14" fill="#085041" text-anchor="middle" dominant-baseline="central">40</text>
<rect x="240" y="160" width="200" height="42" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="181" font-size="14" fill="#444441" text-anchor="middle" dominant-baseline="central">30</text>
<rect x="240" y="208" width="200" height="42" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="229" font-size="14" fill="#444441" text-anchor="middle" dominant-baseline="central">20</text>
<rect x="240" y="256" width="200" height="42" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="277" font-size="14" fill="#444441" text-anchor="middle" dominant-baseline="central">10</text>

<line x1="452" y1="133" x2="486" y2="133" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="492" y="133" font-size="12" fill="#5F5E5A" dominant-baseline="central">top, the only reachable slot</text>
<line x1="452" y1="277" x2="486" y2="277" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="492" y="277" font-size="12" fill="#888780" dominant-baseline="central">bottom, oldest element</text>

<text x="340" y="322" font-size="12" fill="#5F5E5A" text-anchor="middle">Elements leave in the reverse of the order they arrived</text>
</svg>
