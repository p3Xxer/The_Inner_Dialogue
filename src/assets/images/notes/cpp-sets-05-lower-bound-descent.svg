<text x="40" y="125" font-size="15" fill="#1e1e1e">step 1:  20 &lt; 25</text>
<text x="40" y="146" font-size="14" fill="#868e96">→ left subtree useless,</text>
<text x="40" y="166" font-size="14" fill="#868e96">   go RIGHT</text>
<text x="620" y="265" font-size="15" fill="#1e1e1e">step 2:  30 ≥ 25</text>
<text x="620" y="286" font-size="14" fill="#e8590c">→ CANDIDATE: best = 30</text>
<text x="620" y="306" font-size="14" fill="#868e96">→ still go LEFT to look</text>
<text x="620" y="326" font-size="14" fill="#868e96">   for something smaller</text>
<text x="300" y="460" font-size="15" fill="#1e1e1e">step 3: probe hits null → descent ends</text>
<text x="300" y="486" font-size="16" fill="#e8590c">return best → 30</text>
<text x="40" y="544" font-size="14" fill="#868e96">one root-to-leaf walk, one remembered pointer — O(log n), no backtracking</text>
