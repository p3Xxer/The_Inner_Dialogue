<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 300" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>Vector growth</title>
<desc>When a full contiguous block runs out of room, a larger block is allocated elsewhere and every existing element is moved into it.</desc>
<defs><marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="130" y="52" font-size="12" fill="#5F5E5A" text-anchor="end" dominant-baseline="central">Old block, full</text>

<rect x="140" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="184" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="228" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="272" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="316" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="360" y="32" width="44" height="40" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>

<line x1="162" y1="80" x2="112" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>
<line x1="206" y1="80" x2="156" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>
<line x1="250" y1="80" x2="200" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>
<line x1="294" y1="80" x2="244" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>
<line x1="338" y1="80" x2="288" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>
<line x1="382" y1="80" x2="332" y2="182" stroke="#888780" stroke-width="1" marker-end="url(#a4)"/>

<text x="80" y="212" font-size="12" fill="#5F5E5A" text-anchor="end" dominant-baseline="central">New block</text>

<rect x="90" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="134" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="178" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="222" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="266" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="310" y="192" width="44" height="40" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="354" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="398" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="442" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="486" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="530" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="574" y="192" width="44" height="40" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>

<text x="340" y="268" font-size="12" fill="#5F5E5A" text-anchor="middle">One push does n moves, so the cost of that push scales with the stack</text>
</svg>
