<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 290" role="img" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
<title>std::stack as a container adapter</title>
<desc>An outer std::stack wrapper holds an inner container that owns the elements, and forwards each of its three operations to a corresponding container operation.</desc>
<defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="150" y="60" width="460" height="180" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="176" y="92" font-size="14" font-weight="500" fill="#444441">std::stack&lt;int&gt;</text>
<text x="176" y="112" font-size="12" fill="#5F5E5A">Owns no elements</text>

<rect x="330" y="120" width="250" height="94" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="455" y="156" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">std::deque&lt;int&gt; c</text>
<text x="455" y="178" font-size="12" fill="#0F6E56" text-anchor="middle">Holds the actual elements</text>

<text x="105" y="150" font-size="12" fill="#5F5E5A" text-anchor="middle">push, pop, top</text>
<line x1="52" y1="167" x2="232" y2="167" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a3)"/>

<text x="285" y="150" font-size="12" fill="#5F5E5A" text-anchor="middle">forwards to</text>
<line x1="240" y1="167" x2="325" y2="167" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#a3)"/>

<text x="340" y="270" font-size="12" fill="#5F5E5A" text-anchor="middle">The wrapper contributes the access restriction and nothing else</text>
</svg>
